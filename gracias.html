<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Solicitud recibida! — Damer Producciones</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"></noscript>
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
  <style>
    :root {
      --orange:#FF5200;
      --magenta:#D6005F;
      --deep:#0c0c0e;
      --surface:#131316;
      --white:#F8F6F0;
      --muted:rgba(248,246,240,.58);
      --grad:linear-gradient(90deg,var(--orange) 0%,var(--magenta) 100%);
      --display:'Barlow Condensed',sans-serif;
      --body:'Barlow',sans-serif;
      --mono:'DM Mono',monospace;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }

    body {
      background:var(--deep);
      color:var(--white);
      font-family:var(--body);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:48px 5%;
      position:relative;
    }

    .orb {
      position:fixed;
      border-radius:50%;
      pointer-events:none;
    }
    .orb-1 { width:600px; height:600px; top:-10%; right:-8%;  background:radial-gradient(circle,rgba(214,0,95,.15) 0%,transparent 65%); }
    .orb-2 { width:500px; height:500px; bottom:-10%; left:-8%; background:radial-gradient(circle,rgba(255,82,0,.18) 0%,transparent 65%); }

    .card {
      position:relative;
      z-index:1;
      max-width:520px;
      width:100%;
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.14);
      border-top:4px solid var(--orange);
      padding:48px 40px 40px;
      text-align:center;
    }

    .logo-top {
      margin:0 auto 28px;
    }
    .logo-top img {
      height:72px;
      width:auto;
    }

    .eyebrow {
      font-family:var(--mono);
      font-size:.6rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--orange);
      display:block;
      margin-bottom:10px;
    }

    h1 {
      font-family:var(--display);
      font-weight:900;
      font-size:clamp(2rem,6vw,2.8rem);
      text-transform:uppercase;
      letter-spacing:.04em;
      line-height:1;
      margin-bottom:16px;
    }

    .cliente-nombre {
      background:var(--grad);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .desc {
      color:var(--muted);
      font-size:.95rem;
      line-height:1.65;
      margin-bottom:32px;
    }

    .info-box {
      background:rgba(255,82,0,.07);
      border:1px solid rgba(255,82,0,.22);
      border-left:3px solid var(--orange);
      padding:16px 20px;
      text-align:left;
      margin-bottom:32px;
    }
    .info-box p {
      font-family:var(--mono);
      font-size:.62rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      line-height:2;
      margin:0;
    }
    .info-box strong { color:var(--white); font-weight:500; }

    .btn-wa {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      padding:16px 24px;
      background:var(--grad);
      color:#fff;
      text-decoration:none;
      font-family:var(--mono);
      font-size:.72rem;
      font-weight:500;
      letter-spacing:.14em;
      text-transform:uppercase;
      transition:filter .3s;
      clip-path:polygon(0 0,100% 0,100% 72%,97% 100%,0 100%);
      margin-bottom:14px;
    }
    .btn-wa:hover { filter:brightness(1.12); }
    .btn-wa i { font-size:1.2rem; }

    .btn-back {
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-family:var(--mono);
      font-size:.6rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      text-decoration:none;
      transition:color .2s;
    }
    .btn-back:hover { color:var(--white); }

    @media (max-width:540px) {
      .card { padding:36px 24px 32px; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="logo-top">
      <a href="index.html">
        <img src="logo-sm.png" alt="Damer Producciones" width="248" height="100" style="height:72px;width:auto;">
      </a>
    </div>

    <span class="eyebrow">Solicitud enviada</span>
    <h1>¡Todo listo,<br><span class="cliente-nombre" id="clienteNombre">amigo</span>!</h1>

    <p class="desc">
      Recibimos tu solicitud de cotización. En menos de
      <strong>24 horas</strong> uno de nuestros asesores se pone en contacto contigo.<br><br>
      Si prefieres hablar ahora mismo, escríbenos directo por WhatsApp.
    </p>

    <div class="info-box" id="infoBox" style="display:none;">
      <p id="infoEvento"></p>
    </div>

    <a class="btn-wa" id="btnWa" href="#" target="_blank" rel="noopener">
      <i class="fa-brands fa-whatsapp"></i>
      Escribir ahora por WhatsApp
    </a>

    <a class="btn-back" href="index.html">
      <i class="fa-solid fa-arrow-left"></i> Volver al inicio
    </a>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const nombre  = params.get('nombre');
    const evento  = params.get('evento');
    const waUrl   = params.get('wa');

    if (nombre) {
      document.getElementById('clienteNombre').textContent = nombre;
    }

    if (evento) {
      document.getElementById('infoBox').style.display = 'block';
      document.getElementById('infoEvento').innerHTML =
        `Evento solicitado: <strong>${evento}</strong>`;
    }

    if (waUrl) {
      document.getElementById('btnWa').href = waUrl;
    }

    // Enviar a Google Sheets — aquí no hay navegación que cancele el request
    const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxFiqSce4jMTySez1q5T3usMnpuWZptUKS8BA5dcDZXWEYl2CQEs3VaLMC21lOC_dYt/exec';
    const payload = {
      origen: params.get('origen') || 'web',
      nombre: params.get('nombre') || '',
      tel:    params.get('tel')    || '',
      email:  params.get('email')  || '',
      evento: params.get('evento') || '',
      desc:   params.get('desc')   || '',
      lugar:  params.get('lugar')  || '',
      fecha:  params.get('fecha')  || '',
      pref:   params.get('pref')   || '',
      hp:     params.get('hp')     || ''
    };
    if (payload.nombre) {
      const url = SHEETS_URL + '?' + new URLSearchParams(payload).toString();
      fetch(url, { mode: 'no-cors' }).catch(() => {});
    }
  </script>
</body>
</html>
